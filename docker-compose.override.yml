# docker-compose.override.yml — loaded automatically alongside docker-compose.yml
#
# BACKEND ONLY: live bind-mounts for backend/ and scripts/. These are
# OPERATIONAL, not just dev convenience — the launchd pipelines run
# `docker compose exec backend python scripts/…` and rely on reading the
# CURRENT scripts from the mount (no image rebuild per edit).
#
# The frontend dev/HMR service was deliberately moved to docker-compose.dev.yml
# (opt-in). It used to live here, which meant any `docker compose up -d frontend`
# silently replaced the production build with `next dev` — bad for the public
# site (slow, unoptimised, dev overlays). Prod deploys: scripts/deploy_frontend.sh.

services:

  backend:
    volumes:
      - ./backend:/app/backend   # live Python changes without rebuild
      - ./scripts:/app/scripts
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload"
