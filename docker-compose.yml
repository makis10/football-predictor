services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-football_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bind to localhost only — the DB must never be reachable from the network.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-football_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env          # load all vars directly (avoids shell-export shadowing)
    environment:
      # These override env_file so DB URL uses compose interpolation for safety
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-football_db}
      MODEL_VERSION: ${MODEL_VERSION:-1.0.0}
      REDIS_URL: redis://redis:6379/0
      # Shared secret the Next.js proxy must present on identity endpoints.
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
    volumes:
      # Mount data so the container can access CSVs + trained .pkl models
      - ./backend/data:/app/backend/data
    ports:
      # Localhost only — all browser traffic goes through the frontend proxy,
      # never directly to the backend. Prevents X-User-Id spoofing from the network.
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative path — client calls /api/proxy/* which Next.js proxies to backend
        NEXT_PUBLIC_API_URL: /api/proxy
    restart: unless-stopped
    environment:
      # Used by Next.js SSR/RSC on the server side (container → container)
      INTERNAL_API_URL: http://backend:8000
      # NextAuth — must match NEXTAUTH_URL and be set at runtime
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Must match the backend's INTERNAL_API_SECRET — injected by the proxy.
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      # umami analytics website id (create in the dashboard at localhost:3001,
      # then set UMAMI_WEBSITE_ID in .env + `docker compose up -d frontend`).
      # Read server-side at render time, so no rebuild is needed.
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      # Public site URL (SEO metadata / sitemap / OG). Defaults in-code to
      # https://aitipster.net; override here for another deployment.
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://aitipster.net}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    restart: unless-stopped
    # Opt-in only: not started by default. Run with
    #   docker compose --profile tools up -d adminer
    # when you actually need the DB UI, then stop it again.
    profiles: ["tools"]
    ports:
      # Localhost only — DB admin UI must never be exposed to the network.
      - "127.0.0.1:8080:8080"
    depends_on:
      - db

  # Self-hosted web analytics (privacy-friendly, no external service).
  # Dashboard: http://localhost:3001 (localhost only — first login admin/umami,
  # change it). Visitors load the tracker same-origin via the Next.js rewrites
  # /u/script.js + /u/api/send, so no extra public port/tunnel is needed.
  # Uses its own database ("umami") inside the existing Postgres instance:
  #   docker compose exec -T db sh -c 'psql -U "$POSTGRES_USER" -c "CREATE DATABASE umami"'
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me-umami-secret}
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
